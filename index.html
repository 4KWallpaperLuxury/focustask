        .lang-bar {
            background: var(--black);
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--purple);
        }
        .lang-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.55);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 16px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .lang-btn.active {
            background: var(--purple);
            border-color: var(--purple);
            color: white;
        }
        .lang-btn:hover:not(.active) {
            border-color: rgba(255,255,255,0.6);
            color: white;
        }

        header {
            background: var(--purple);
            border-bottom: 4px solid var(--black);
            padding: 48px 20px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -60px; left: -30px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }

            display: inline-block;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 12px 28px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--black);
        }
        header h1 {
            color: white;
            font-weight: 800;
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
            position: relative;

            font-size: 0.88rem;

            font-size: 0.82rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--black);

        }
        section {
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 28px;

            border-color: var(--black);
        }

            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--black);
            display: flex;
            align-items: center;

            display: inline-block;

            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;

            font-size: 0.95rem;
            color: #3a3a3a;
            margin-bottom: 10px;

        section ul { padding-left: 22px; margin-top: 6px; }
        section ul li { margin-bottom: 8px; }
        section ul li::marker { color: var(--purple); font-weight: bold; }

            border: 2px solid var(--black);
            padding: 16px 20px;
            margin-top: 16px;
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.7;

        .box.green  { background: var(--green); }
        .box.blue   { background: var(--blue); }
        .box.yellow { background: var(--yellow); }

        .pillars {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 14px;
            margin-top: 18px;

        .pillar {
            border: 3px solid var(--black);
            padding: 18px 16px;

        }
        .pillar.p-green  { background: var(--green); }
        .pillar.p-yellow { background: var(--yellow); }
        .pillar.p-blue   { background: var(--blue); }
        .pillar .pill-icon { font-size: 1.8rem; margin-bottom: 8px; }

            color: #3a3a3a;
            line-height: 1.5;

        a:hover { background: var(--purple); color: white; }

            text-align: center;

            border-top: 4px solid var(--purple);

        footer a { color: var(--yellow); border-bottom-color: var(--yellow); }
        footer a:hover { background: var(--yellow); color: var(--black); }

            header h1 { font-size: 1.6rem; }
            section { padding: 20px; }
            .pillars { grid-template-columns: 1fr; }
        }

var currentLang = 'en';

function render(lang) {
    var d = DATA[lang];
    document.getElementById('h-title').textContent = d.title;
    document.getElementById('h-date').textContent = d.date;
    document.getElementById('h-paid-badge').innerHTML = d.paidBadge;
    document.getElementById('f-tagline').textContent = d.tagline;

    var html = '';
    d.sections.forEach(function(s) {
        var badgeHtml = s.badge ? '<span class="badge ' + s.badgeClass + '">' + s.badge + '</span>' : '';
        var sectionClass = s.highlight ? 'class="highlight-section"' : '';
        html += '<section ' + sectionClass + '><h2>' + s.num + '. ' + s.title + ' ' + badgeHtml + '</h2>' + s.body + '</section>';
    });
    document.getElementById('content').innerHTML = html;
}

function setLang(lang) {
    currentLang = lang;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
    render(lang);
}

// Init
render('en');
