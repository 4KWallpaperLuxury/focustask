        /* LANG BAR */
        .lang-bar {
            background: var(--black);
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--purple);
        }
        .lang-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.55);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 16px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .lang-btn.active {
            background: var(--purple);
            border-color: var(--purple);
            color: white;
        }
        .lang-btn:hover:not(.active) {
            border-color: rgba(255,255,255,0.6);
            color: white;
        }

        /* HEADER */
        header {
            background: var(--purple);
            border-bottom: 4px solid var(--black);
            padding: 48px 20px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -60px; left: -30px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
        header .logo {
            display: inline-block;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 12px 28px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        header .logo span {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--black);
        }
        header h1 {
            color: white;
            font-weight: 800;
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

            color: rgba(255,255,255,0.7);
            font-weight: 500;
            margin-top: 10px;
            font-size: 0.88rem;
            position: relative;
            z-index: 1;
        }

        /* MAIN */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }
        section {
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 24px;
        }
        section h2 {
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--black);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            background: var(--yellow);
            border: 2px solid var(--black);
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge.blue  { background: var(--blue); }

        section p, section li {
            font-size: 0.95rem;
            color: #3a3a3a;
            margin-bottom: 10px;
        }
        section p:last-child { margin-bottom: 0; }
        section ul { padding-left: 22px; margin-top: 6px; }
        section ul li { margin-bottom: 8px; }
        section ul li::marker { color: var(--purple); font-weight: bold; }

        .box {
            border: 2px solid var(--black);
            padding: 16px 20px;
            margin-top: 16px;
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.7;

        .box.blue   { background: var(--blue); }
        .box.yellow { background: var(--yellow); }

        a { color: var(--purple); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--purple); }
        a:hover { background: var(--purple); color: white; }

        /* FOOTER */

            background: var(--black);
            color: white;
            text-align: center;
            padding: 36px 20px;
            border-top: 4px solid var(--purple);

        footer a:hover { background: var(--yellow); color: var(--black); }

        @media (max-width: 600px) {
            header h1 { font-size: 1.6rem; }
            section { padding: 20px; }
        }

</head>

var currentLang = 'en';

function render(lang) {
    var d = DATA[lang];
    document.getElementById('h-title').textContent = d.title;
    document.getElementById('h-date').textContent = d.date;
    document.getElementById('f-tagline').textContent = d.tagline;

    var html = '';
    d.sections.forEach(function(s) {
        var badgeHtml = s.badge ? '<span class="badge ' + s.badgeClass + '">' + s.badge + '</span>' : '';
        html += '<section><h2>' + s.num + '. ' + s.title + ' ' + badgeHtml + '</h2>' + s.body + '</section>';
    });
    document.getElementById('content').innerHTML = html;
}

function setLang(lang) {
    currentLang = lang;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
    render(lang);
}

// Init
render('en');
</script>
