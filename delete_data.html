<html lang="en">
<head>

    <style>
        :root {
            --purple: #6750A4;
            --purple-light: #9575CD;
            --bg: #F8F7FB;
            --black: #17161C;
            --yellow: #FFF3C4;
            --green: #C6F6D5;
            --blue: #BFDBFE;
            --red: #FEE2E2;
            --red-border: #F87171;
            --red-text: #B91C1C;
            --shadow: 5px 5px 0px var(--black);
            --border: 3px solid var(--black);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg);
            color: var(--black);
            line-height: 1.75;
        }

        /* LANG BAR */
        .lang-bar {
            background: var(--black);
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--purple);
        }
        .lang-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.55);
            font-family: 'Space Grotesk', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 16px;
            cursor: pointer;
            transition: all .15s;
        }
        .lang-btn.active { background: var(--purple); border-color: var(--purple); color: white; }
        .lang-btn:hover:not(.active) { border-color: rgba(255,255,255,.6); color: white; }

        /* HEADER */
        header {
            background: var(--purple);
            border-bottom: 4px solid var(--black);
            padding: 48px 20px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .orb1 {
            position: absolute; top: -40px; right: -40px;
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(255,255,255,.06);
            animation: float 6s ease-in-out infinite;
        }
        .orb2 {
            position: absolute; bottom: -60px; left: -30px;
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(255,255,255,.04);
            animation: float 8s ease-in-out infinite reverse;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes popIn  { from{opacity:0;transform:scale(.7)} }
        @keyframes slideUp{ from{opacity:0;transform:translateY(18px)} }

        .logo {
            display: inline-block;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 12px 28px;
            margin-bottom: 20px;
            position: relative; z-index: 1;
            animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
        }
        .logo span { font-weight: 800; font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; color: var(--black); }

        header h1 {
            color: white; font-weight: 800;
            font-size: clamp(1.5rem, 5vw, 2.4rem);
            text-transform: uppercase; letter-spacing: 2px;
            margin-top: 12px; position: relative; z-index: 1;
            animation: slideUp .5s .1s both;
        }
        header p.upd {
            color: rgba(255,255,255,.7); font-size: .88rem;
            margin-top: 8px; position: relative; z-index: 1;
            animation: slideUp .5s .2s both;
        }

        /* Quick nav */
        .quick-nav {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 10px;
            margin-top: 24px; position: relative; z-index: 1;
            animation: slideUp .5s .3s both;
        }
        .qn-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,.3);
            color: rgba(255,255,255,.75);
            font-family: 'Space Grotesk', sans-serif;
            font-size: .75rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 6px 16px; cursor: pointer;
            transition: all .2s; text-decoration: none;
        }
        .qn-btn:hover { border-color: white; color: white; }
        .qn-btn.danger {
            background: #B91C1C; border-color: white; color: white;
            box-shadow: 3px 3px 0 rgba(0,0,0,.3);
        }
        .qn-btn.danger:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 rgba(0,0,0,.3); }

        /* MAIN */
        main { max-width: 820px; margin: 0 auto; padding: 36px 20px 72px; }

        section {
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 24px;
            opacity: 0; transform: translateY(24px);
            transition: opacity .5s, transform .5s;
        }
        section.vis { opacity: 1; transform: translateY(0); }

        /* Deletion section */
        section.del-section {
            background: #fff8f8;
            border-color: var(--red-border);
            box-shadow: 5px 5px 0 #F87171;
            scroll-margin-top: 20px;
        }

        h2 {
            font-weight: 800; font-size: 1.05rem;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 18px; padding-bottom: 12px;
            border-bottom: 3px solid var(--black);
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .badge {
            display: inline-block; border: 2px solid var(--black);
            padding: 2px 10px; font-size: .7rem; font-weight: 700;
            letter-spacing: .5px; text-transform: uppercase;
        }
        .badge.y { background: var(--yellow); }
        .badge.g { background: var(--green); }
        .badge.b { background: var(--blue); }
        .badge.r { background: var(--red); color: var(--red-text); border-color: var(--red-border); }

        section p, section li { font-size: .93rem; color: #3a3a3a; margin-bottom: 10px; }
        section ul { padding-left: 22px; margin-top: 6px; }
        section ul li { margin-bottom: 8px; }
        section ul li::marker { color: var(--purple); font-weight: bold; }
        strong { color: var(--black); }
        a { color: var(--purple); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--purple); }
        a:hover { background: var(--purple); color: white; }

        /* INFO BOX */
        .box {
            border: 2px solid var(--black); padding: 14px 18px;
            margin-top: 14px; font-size: .9rem; font-weight: 600; line-height: 1.7;
        }
        .box.g { background: var(--green); }
        .box.b { background: var(--blue); }
        .box.y { background: var(--yellow); }
        .box.r { background: var(--red); border-color: var(--red-border); color: var(--red-text); }

        /* DATA TABLE */
        .dtable { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: .88rem; }
        .dtable th {
            background: #f0eefa; color: var(--purple);
            font-size: .72rem; letter-spacing: 1px; text-transform: uppercase;
            padding: 10px 14px; text-align: left;
            border-bottom: 2px solid var(--black);
        }
        .dtable td {
            padding: 12px 14px;
            border-bottom: 1px solid #e8e5f0;
            color: #3a3a3a; vertical-align: top;
        }
        .dtable tr:last-child td { border-bottom: none; }

        .pill {
            display: inline-block; padding: 2px 10px;
            font-size: .72rem; font-weight: 700; letter-spacing: .5px;
            border: 2px solid var(--black);
        }
        .pill.del  { background: var(--red);    color: var(--red-text); border-color: var(--red-border); }
        .pill.keep { background: var(--yellow);  color: #92400E; }
        .pill.anon { background: var(--green);   color: #166534; }

        /* STEPS */
        .steps { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
        .step {
            display: flex; gap: 14px; align-items: flex-start;
            background: var(--bg); border: 2px solid var(--black);
            padding: 16px;
            transition: transform .2s, box-shadow .2s;
            cursor: default;
        }
        .step:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #F87171; }
        .step-num {
            flex-shrink: 0; width: 32px; height: 32px;
            background: var(--red); border: 2px solid var(--red-border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: .85rem; color: var(--red-text);
        }
        .step-body { flex: 1; }
        .step-label { font-weight: 800; font-size: .9rem; margin-bottom: 3px; }
        .step-desc  { font-size: .85rem; color: #555; line-height: 1.5; margin: 0; }

        /* TIMELINE */
        .timeline { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .tl-card {
            flex: 1; min-width: 110px;
            border: var(--border); box-shadow: var(--shadow);
            padding: 16px; text-align: center; background: white;
        }
        .tl-num {
            font-weight: 800; font-size: 1.5rem;
            color: var(--red-text); display: block; line-height: 1.2;
        }
        .tl-txt { font-size: .75rem; color: #666; margin-top: 4px; display: block; }

        /* EMAIL CTA */
        .email-cta {
            background: var(--green);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 22px 24px;
            margin-top: 24px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .email-cta .label { font-size: .72rem; color: #166534; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .email-cta .addr { font-size: 1.1rem; font-weight: 800; color: var(--black); border-bottom: 3px solid var(--black); }
        .email-cta .addr:hover { background: var(--purple); color: white; border-bottom-color: var(--purple); }
        .email-cta .subj { font-size: .82rem; color: #166534; font-style: italic; }

        /* FOOTER */
        footer {
            background: var(--black); color: white;
            text-align: center; padding: 36px 20px;
            border-top: 4px solid var(--purple);
        }
        footer .studio { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
        footer p { font-size: .85rem; color: rgba(255,255,255,.5); }
        footer a { color: var(--yellow); border-bottom-color: var(--yellow); }
        footer a:hover { background: var(--yellow); color: var(--black); }

        @media (max-width: 600px) {
            section { padding: 20px; }
            .dtable th, .dtable td { padding: 8px 10px; font-size: .82rem; }
        }
    </style>
</head>

var cur = 'en';

function render(lang) {
  var d = DATA[lang];
  document.getElementById('htitle').textContent = d.title;
  document.getElementById('hdate').textContent  = d.date;
  document.getElementById('fline').textContent  = d.fline;
  ['qn1','qn2','qn3'].forEach(function(id,i){ document.getElementById(id).innerHTML = d.qn[i]; });

  var html = '';
  d.sections.forEach(function(s) {
    var bh = s.badge ? '<span class="badge '+s.bc+'">'+s.badge+'</span>' : '';
    html += '<section id="'+s.id+'" class="'+s.cls+'"><h2><span style="background:var(--purple);color:white;padding:2px 10px;font-size:.8rem;">'+s.num+'</span> '+s.title+' '+bh+'</h2>'+s.body+'</section>';
  });
  document.getElementById('content').innerHTML = html;

  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('vis'); obs.unobserve(e.target); }});
  }, {threshold:.07});
  document.querySelectorAll('section').forEach(function(s,i){
    s.style.transitionDelay = (i*.08)+'s';
    obs.observe(s);
  });
}

function setLang(lang) {
  cur = lang;
  document.getElementById('ben').classList.toggle('active', lang==='en');
  document.getElementById('bvi').classList.toggle('active', lang==='vi');
  render(lang);
}

document.querySelectorAll && document.addEventListener('click', function(e){
  var a = e.target.closest('a[href^="#"]');
  if(!a) return;
  var t = document.querySelector(a.getAttribute('href'));
  if(t){ e.preventDefault(); t.scrollIntoView({behavior:'smooth'}); t.classList.add('vis'); }
});

if(window.location.hash === '#data-deletion'){
  setTimeout(function(){
    var el = document.getElementById('data-deletion');
    if(el){ el.scrollIntoView({behavior:'smooth'}); el.classList.add('vis'); }
  }, 400);
}

render('en');
</script>
